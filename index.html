<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Team Tracker (Ver 9.2.4 - Complete Master Baseline)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080B10; }
        .heading-font { font-family: 'Urbanist', sans-serif; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- IMPORTANT CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1-nYWa-rrdwDywuOwUERSk5_c8Epgp2M5LKp96oM1Rbvpz6q_tEqCMRnz02gvnq2YlQ/exec"; 

        const COMPONENTS = ["TB", "TWE", "Others"];
        const STAGES = ["PS", "GS", "JHS", "SHS"];
        const STAGE_LEVELS = {
            "PS": ["N", "K1", "K2"],
            "GS": ["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6"],
            "JHS": ["Grade 7", "Grade 8", "Grade 9", "Grade 10"],
            "SHS": ["GenMath", "Basic Cal", "Pre Cal", "Stat and Prob", "Bus Math"]
        };

        const DEFAULT_USERS = ["Nila (Editor)", "Juan (Writer)", "Santi (Illustrator)", "Maria (Proofreader)", "Admin/PM"];

        function App() {
            const [users, setUsers] = useState(DEFAULT_USERS);
            const [projects, setProjects] = useState([]);
            const [currentUser, setCurrentUser] = useState("");
            const [activeTab, setActiveTab] = useState("user-view"); 
            const [isLoading, setIsLoading] = useState(true);

            // Filter States for Master View (RESTORATION FROM V9)
            const [selectedSeriesFilter, setSelectedSeriesFilter] = useState("ALL");
            const [selectedStageFilter, setSelectedStageFilter] = useState("ALL");

            // Toggles & Modals
            const [openArchiveLogs, setOpenArchiveLogs] = useState({});
            const [isProjectModalOpen, setIsProjectModalOpen] = useState(false);
            const [isHandOffModalOpen, setIsHandOffModalOpen] = useState(false);
            const [isParallelModalOpen, setIsParallelModalOpen] = useState(false);

            // Forms State
            const [seriesCreationMode, setSeriesCreationMode] = useState("new");
            const [newSeriesInput, setNewSeriesInput] = useState("");
            const [selectedExistingSeries, setSelectedExistingSeries] = useState("");
            const [selectedComponent, setSelectedComponent] = useState(COMPONENTS[0]);
            const [selectedStage, setSelectedStage] = useState(STAGES[0]);
            const [selectedLevel, setSelectedLevel] = useState(STAGE_LEVELS[STAGES[0]][0]);
            const [firstAssignee, setFirstAssignee] = useState("");

            const [handOffTarget, setHandOffTarget] = useState(null); 
            const [nextAssignee, setNextAssignee] = useState("");
            const [parallelTargetProjectId, setParallelTargetProjectId] = useState(null);
            const [parallelAssignee, setParallelAssignee] = useState("");

            const [definedTaskNames, setDefinedTaskNames] = useState({});
            const [toast, setToast] = useState(null);

            const triggerToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 4000);
            };

            const loadCloudData = useCallback(async (showToast = false) => {
                if (SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE") {
                    setIsLoading(false);
                    return;
                }
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=readAll`);
                    const data = await response.json();
                    
                    if (data.users && data.users.length > 0) {
                        setUsers(data.users);
                        if (!currentUser) setCurrentUser(data.users[0]);
                    }
                    if (data.projects) setProjects(data.projects);
                    if (showToast) triggerToast("🔄 System Database Synced!");
                } catch (error) {
                    console.error("Cloud Error:", error);
                    triggerToast("❌ Sync failure.");
                } finally {
                    setIsLoading(false);
                }
            }, [currentUser]);

            const syncToCloud = async (updatedProjects, updatedUsers) => {
                if (SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE") return;
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "syncAll", projects: updatedProjects, users: updatedUsers })
                    });
                    triggerToast("☁️ Saved & Cloud Synced!");
                } catch (error) {
                    console.error("Cloud push failed:", error);
                    triggerToast("❌ Saved locally, Cloud failed.");
                }
            };

            useEffect(() => {
                loadCloudData();
                const interval = setInterval(() => loadCloudData(false), 30000);
                return () => clearInterval(interval);
            }, [loadCloudData]);

            useEffect(() => {
                setSelectedLevel(STAGE_LEVELS[selectedStage][0]);
            }, [selectedStage]);

            const getFormattedDateTime = () => new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: true });

            const handleUnarchive = async (projectId) => {
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, isArchived: false, tasks: [{ id: `task-${Date.now()}`, name: "Restored Task Context Placeholder", status: "Pending Transfer", assignee: currentUser, startDate: null, endDate: null, isParallel: false }] };
                });
                setProjects(updated);
                await syncToCloud(updated, users);
                triggerToast("📂 Project restored to active tracking!");
            };

            const handleReceiveAndStart = async (projectId, taskId) => {
                const taskName = definedTaskNames[`${projectId}-${taskId}`];
                if (!taskName || !taskName.trim()) { triggerToast("Please add a description!"); return; }
                const now = getFormattedDateTime();
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, name: taskName.trim(), status: "In Progress", startDate: now } : t) };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const handleDoneClick = (projectId, taskId) => {
                setHandOffTarget({ projectId, taskId }); setNextAssignee(users.find(u => u !== currentUser) || users[0]); setIsHandOffModalOpen(true);
            };

            const executeHandOff = async (e) => {
                e.preventDefault(); if (!handOffTarget) return;
                const { projectId, taskId } = handOffTarget;
                const historyDate = getFormattedDateTime(); 

                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const targetTask = p.tasks.find(t => t.id === taskId);
                    const completedTask = { ...targetTask, status: "Done", endDate: historyDate };
                    const remainingTasks = p.tasks.filter(t => t.id !== taskId);
                    const shouldSpawnNextPlaceholder = !targetTask.isParallel && remainingTasks.filter(r => !r.isParallel).length === 0;

                    let updatedTasks = remainingTasks;
                    if (shouldSpawnNextPlaceholder) {
                        updatedTasks = [...remainingTasks, { id: `task-${Date.now()}`, name: "Awaiting task description...", status: "Pending Transfer", assignee: nextAssignee, startDate: null, endDate: null, isParallel: false }];
                    }
                    return { ...p, tasks: updatedTasks, history: [completedTask, ...p.history] };
                });

                setProjects(updated); setIsHandOffModalOpen(false); setHandOffTarget(null); await syncToCloud(updated, users);
            };

            const handleAbsoluteFinishProject = async (projectId, taskId) => {
                if (!window.confirm("Is this book module completely finalized? Track will be archived.")) return;
                const historyDate = getFormattedDateTime();
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const targetTask = p.tasks.find(t => t.id === taskId);
                    return {
                        ...p,
                        isArchived: true,
                        tasks: [],
                        history: [{ ...targetTask, status: "Done", endDate: historyDate }, ...p.history]
                    };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const openParallelModal = (projectId) => {
                setParallelTargetProjectId(projectId); setParallelAssignee(users.find(u => u !== currentUser) || users[0]); setIsParallelModalOpen(true);
            };

            const executeParallelBranch = async (e) => {
                e.preventDefault(); if (!parallelTargetProjectId) return;
                const updated = projects.map(p => {
                    if (p.id !== parallelTargetProjectId) return p;
                    return { ...p, tasks: [...p.tasks, { id: `task-${Date.now()}`, name: "Awaiting parallel task...", status: "Pending Transfer", assignee: parallelAssignee, startDate: null, endDate: null, isParallel: true }] };
                });
                setProjects(updated); setIsParallelModalOpen(false); await syncToCloud(updated, users);
            };

            const handleCreateProject = async (e) => {
                e.preventDefault();
                let seriesName = seriesCreationMode === "new" ? newSeriesInput.trim().toUpperCase() : selectedExistingSeries;
                if (!seriesName) return;
                const computedTitle = `${seriesName} - ${selectedComponent} - ${selectedStage} - ${selectedLevel}`;
                const newProj = {
                    id: `proj-${Date.now()}`, series: seriesName, component: selectedComponent, stage: selectedStage, level: selectedLevel, title: computedTitle, isArchived: false,
                    tasks: [{ id: `task-${Date.now()}`, name: "Awaiting task description...", status: "Pending Transfer", assignee: firstAssignee || users[0], startDate: null, endDate: null, isParallel: false }],
                    history: []
                };
                const updated = [newProj, ...projects]; setProjects(updated); setIsProjectModalOpen(false); await syncToCloud(updated, users);
            };

            // Workload Extraction
            const myPlateTasks = [];
            projects.forEach(p => {
                if (!p.isArchived) {
                    p.tasks.forEach(t => { if (t.assignee === currentUser) myPlateTasks.push({ projectId: p.id, projectTitle: p.title, ...t }); });
                }
            });

            // Dynamic Unique Lists for Filters
            const uniqueSeriesList = ["ALL", ...Array.from(new Set(projects.map(p => p.series)))];

            // Master Filter Logic (RESTORATION APPLIED)
            const filteredMasterProjects = projects.filter(p => {
                if (p.isArchived) return false;
                const matchSeries = selectedSeriesFilter === "ALL" || p.series === selectedSeriesFilter;
                const matchStage = selectedStageFilter === "ALL" || p.stage === selectedStageFilter;
                return matchSeries && matchStage;
            });

            if (isLoading) return <div className="flex flex-col items-center justify-center min-h-screen bg-[#080B10] text-slate-400 font-bold">Loading Production Matrix Base...</div>;

            return (
                <div className="max-w-5xl mx-auto px-4 py-6 md:py-10">
                    {toast && <div className="fixed top-6 right-6 z-50 bg-slate-900 border border-indigo-500/40 p-4 rounded-xl text-xs font-bold text-slate-100">{toast}</div>}

                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-6 mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-extrabold heading-font text-white tracking-tight">Math Team Tracker<span className="text-indigo-400">.</span></h1>
                        </div>
                        <div className="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
                            <button onClick={() => loadCloudData(true)} className="bg-slate-900 border border-slate-800 text-slate-400 px-3 py-2 rounded-xl text-xs font-bold hover:text-white transition"><i className="fa-solid fa-arrows-rotate mr-1"></i> Refresh</button>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2">
                                <select value={currentUser} onChange={(e) => setCurrentUser(e.target.value)} className="bg-transparent font-bold text-slate-100 text-sm focus:outline-none">
                                    {users.map(u => <option className="bg-slate-950" key={u} value={u}>{u}</option>)}
                                </select>
                            </div>
                            <button onClick={() => setIsProjectModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 shadow-lg transition"><i className="fa-solid fa-plus text-xs"></i> New Project</button>
                        </div>
                    </header>

                    {/* Navigation Tab Bar */}
                    <div className="flex flex-wrap gap-2 border-b border-slate-800 mb-8 bg-slate-900 p-1 rounded-xl w-full">
                        <button onClick={() => setActiveTab("user-view")} className={`px-4 py-2 rounded-lg font-bold text-xs transition ${activeTab === 'user-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>My Plate ({myPlateTasks.length})</button>
                        <button onClick={() => setActiveTab("master-view")} className={`px-4 py-2 rounded-lg font-bold text-xs transition ${activeTab === 'master-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>All Active Tracks ({projects.filter(p=>!p.isArchived).length})</button>
                        <button onClick={() => setActiveTab("archive-view")} className={`px-4 py-2 rounded-lg font-bold text-xs transition ${activeTab === 'archive-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}><i className="fa-solid fa-box-archive mr-1.5"></i> Archive Logs</button>
                    </div>

                    {/* TAB 1: MY PLATE VIEW */}
                    {activeTab === "user-view" && (
                        <div className="grid gap-4 sm:grid-cols-2">
                            {myPlateTasks.length === 0 ? <p className="text-slate-600 italic p-10 col-span-2 text-center">Your workload is completely clear.</p> : myPlateTasks.map(task => (
                                <div key={task.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between mb-3">
                                            <span className="text-[10px] font-bold bg-slate-950 px-2 py-0.5 rounded border border-slate-800 truncate">📚 {task.projectTitle}</span>
                                            <span className="text-[9px] font-black px-2 py-0.5 rounded uppercase bg-emerald-950 text-emerald-400">{task.status === "Pending Transfer" ? "📥 Incoming" : "In Progress"}</span>
                                        </div>
                                        {task.status === "Pending Transfer" ? (
                                            <div className="mb-4 bg-slate-950 p-3.5 rounded-xl border border-dashed border-slate-800">
                                                <input type="text" placeholder="Task description context..." value={definedTaskNames[`${task.projectId}-${task.id}`] || ""} onChange={(e) => setDefinedTaskNames({ ...definedTaskNames, [`${task.projectId}-${task.id}`]: e.target.value })} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none" />
                                            </div>
                                        ) : (
                                            <div className="mb-4 bg-slate-950/30 p-3 rounded-xl border border-slate-800/40">
                                                <h3 className="text-xs font-bold text-slate-200 mb-1">{task.name}</h3>
                                                <p className="text-[9px] text-slate-500">Started: {task.startDate}</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex flex-col gap-2 pt-3 border-t border-slate-800/60">
                                        {task.status === "Pending Transfer" ? <button onClick={() => handleReceiveAndStart(task.projectId, task.id)} className="w-full bg-emerald-600 text-slate-950 text-xs font-black py-2 rounded-xl">Receive & Start</button> : (
                                            <div className="space-y-2">
                                                <div className="flex gap-2">
                                                    <button onClick={() => openParallelModal(task.projectId)} className="bg-slate-800 text-slate-300 text-xs font-bold px-3 py-1.5 rounded-xl flex-1">+ Parallel</button>
                                                    <button onClick={() => handleDoneClick(task.projectId, task.id)} className="flex-[2] bg-indigo-600 text-white text-xs font-black py-1.5 rounded-xl">Done & Pass</button>
                                                </div>
                                                <button onClick={() => handleAbsoluteFinishProject(task.projectId, task.id)} className="w-full bg-gradient-to-r from-slate-950 to-slate-900 text-rose-400 font-bold text-xs py-1.5 rounded-xl border border-slate-800/60">Mark Book Complete & Archive</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* TAB 2: FULLY RESTORED MASTER VIEW WITH DYNAMIC FILTER BUTTONS */}
                    {activeTab === "master-view" && (
                        <div className="space-y-6">
                            
                            {/* Filter Block 1: Per Series */}
                            <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-xl space-y-2">
                                <span className="text-[10px] font-black uppercase text-slate-500 tracking-wider block"><i className="fa-solid fa-tags mr-1"></i> Filter Per Series:</span>
                                <div className="flex flex-wrap gap-1.5">
                                    {uniqueSeriesList.map(series => (
                                        <button key={series} onClick={() => setSelectedSeriesFilter(series)} className={`px-3 py-1 rounded-lg font-bold text-xs border transition ${selectedSeriesFilter === series ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-slate-950 text-slate-400 border-slate-800 hover:text-slate-200'}`}>{series}</button>
                                    ))}
                                </div>
                            </div>

                            {/* Filter Block 2: Per Level / Stage */}
                            <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-xl space-y-2">
                                <span className="text-[10px] font-black uppercase text-slate-500 tracking-wider block"><i className="fa-solid fa-layer-group mr-1"></i> Filter Per Level/Stage:</span>
                                <div className="flex flex-wrap gap-1.5">
                                    <button onClick={() => setSelectedStageFilter("ALL")} className={`px-3 py-1 rounded-lg font-bold text-xs border transition ${selectedStageFilter === "ALL" ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-slate-950 text-slate-400 border-slate-800 hover:text-slate-200'}`}>ALL LEVELS</button>
                                    {STAGES.map(stage => (
                                        <button key={stage} onClick={() => setSelectedStageFilter(stage)} className={`px-3 py-1 rounded-lg font-bold text-xs border transition ${selectedStageFilter === stage ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-slate-950 text-slate-400 border-slate-800 hover:text-slate-200'}`}>{stage}</button>
                                    ))}
                                </div>
                            </div>

                            {/* Pipeline Section Output */}
                            <div className="space-y-3">
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">Active Track Matrix ({filteredMasterProjects.length} visible)</h2>
                                    {(selectedSeriesFilter !== "ALL" || selectedStageFilter !== "ALL") && (
                                        <button onClick={() => { setSelectedSeriesFilter("ALL"); setSelectedStageFilter("ALL"); }} className="text-[10px] text-indigo-400 hover:underline font-bold">Clear Filters</button>
                                    )}
                                </div>
                                
                                {filteredMasterProjects.length === 0 ? <p className="text-slate-600 italic p-10 text-center bg-slate-900/20 border border-slate-800/50 rounded-xl">No active tracks match your selected filter matrix.</p> :
                                filteredMasterProjects.map(

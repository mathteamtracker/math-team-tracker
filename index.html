<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Team Tracker (Ver 9.1 - Mobile Optimized)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080B10; }
        .heading-font { font-family: 'Urbanist', sans-serif; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div id="root"></div>

    <script>
        const { useState, useEffect, useCallback } = React;
        const e = React.createElement;

        // --- IMPORTANT CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1-nYWa-rrdwDywuOwUERSk5_c8Epgp2M5LKp96oM1Rbvpz6q_tEqCMRnz02gvnq2YlQ/exec"; 

        const COMPONENTS = ["TB", "TWE", "Others"];
        const STAGES = ["PS", "GS", "JHS", "SHS"];
        const STAGE_LEVELS = {
            "PS": ["N", "K1", "K2"],
            "GS": ["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6"],
            "JHS": ["Grade 7", "Grade 8", "Grade 9", "Grade 10"],
            "SHS": ["GenMath", "Basic Cal", "Pre Cal", "Stat and Prob", "Bus Math"]
        };

        const DEFAULT_USERS = ["Nila (Editor)", "Juan (Writer)", "Santi (Illustrator)", "Maria (Proofreader)", "Admin/PM"];

        function App() {
            const [users, setUsers] = useState(DEFAULT_USERS);
            const [projects, setProjects] = useState([]);
            const [currentUser, setCurrentUser] = useState("");
            const [activeTab, setActiveTab] = useState("user-view");
            const [isLoading, setIsLoading] = useState(true);

            const [expandedSeries, setExpandedSeries] = useState({});
            const [expandedComponents, setExpandedComponents] = useState({});
            const [expandedStages, setExpandedStages] = useState({});
            const [lastHandOffAction, setLastHandOffAction] = useState(null);

            // Modals
            const [isProjectModalOpen, setIsProjectModalOpen] = useState(false);
            const [isHandOffModalOpen, setIsHandOffModalOpen] = useState(false);
            const [isTeamModalOpen, setIsTeamModalOpen] = useState(false);
            const [isParallelModalOpen, setIsParallelModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);

            // Forms Strategy
            const [seriesCreationMode, setSeriesCreationMode] = useState("new");
            const [newSeriesInput, setNewSeriesInput] = useState("");
            const [selectedExistingSeries, setSelectedExistingSeries] = useState("");
            const [selectedComponent, setSelectedComponent] = useState(COMPONENTS[0]);
            const [selectedStage, setSelectedStage] = useState(STAGES[0]);
            const [selectedLevel, setSelectedLevel] = useState(STAGE_LEVELS[STAGES[0]][0]);
            const [newProjectStageColor, setNewProjectStageColor] = useState("Red");
            const [firstAssignee, setFirstAssignee] = useState("");

            const [handOffTarget, setHandOffTarget] = useState(null); 
            const [nextAssignee, setNextAssignee] = useState("");
            const [parallelTargetProjectId, setParallelTargetProjectId] = useState(null);
            const [parallelAssignee, setParallelAssignee] = useState("");
            const [editTarget, setEditTarget] = useState(null); 
            const [editTaskNameInput, setEditTaskNameInput] = useState("");
            const [newMemberName, setNewMemberName] = useState("");
            const [newMemberRole, setNewMemberRole] = useState("");

            const [definedTaskNames, setDefinedTaskNames] = useState({});
            const [toast, setToast] = useState(null);

            const triggerToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 4000);
            };

            const loadCloudData = useCallback(async (showToast = false) => {
                if (SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE") {
                    setIsLoading(false);
                    return;
                }
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=readAll`);
                    const data = await response.json();
                    
                    if (data.users && data.users.length > 0) {
                        setUsers(data.users);
                        if (!currentUser) setCurrentUser(data.users[0]);
                    }
                    if (data.projects) setProjects(data.projects);
                    if (showToast) triggerToast("🔄 Data refreshed from Cloud Database.");
                } catch (error) {
                    console.error("Error reading cloud data:", error);
                    triggerToast("❌ Connection error reading from cloud.");
                } finally {
                    setIsLoading(false);
                }
            }, [currentUser]);

            const syncToCloud = async (updatedProjects, updatedUsers) => {
                if (SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE") return;
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "syncAll", projects: updatedProjects, users: updatedUsers })
                    });
                    triggerToast("☁️ Saved & Synced successfully for all users!");
                } catch (error) {
                    console.error("Cloud push failed:", error);
                    triggerToast("❌ Failed syncing changes to cloud.");
                }
            };

            useEffect(() => {
                loadCloudData();
                const interval = setInterval(() => loadCloudData(false), 30000);
                return () => clearInterval(interval);
            }, [loadCloudData]);

            useEffect(() => {
                setSelectedLevel(STAGE_LEVELS[selectedStage][0]);
            }, [selectedStage]);

            const existingSeriesList = Array.from(new Set(projects.map(p => p.series))).filter(Boolean);

            useEffect(() => {
                if (existingSeriesList.length > 0 && !selectedExistingSeries) {
                    setSelectedExistingSeries(existingSeriesList[0]);
                }
            }, [existingSeriesList, selectedExistingSeries]);

            const getFormattedDateTime = () => {
                return new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: true });
            };

            const getFormattedDateOnly = () => {
                return new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
            };

            const handleAddMember = async (e) => {
                e.preventDefault();
                if (!newMemberName.trim() || !newMemberRole.trim()) return;
                const formattedUserString = `${newMemberName.trim()} (${newMemberRole.trim()})`;
                if (users.includes(formattedUserString)) { triggerToast("Member already exists!"); return; }
                const newUsers = [...users, formattedUserString];
                setUsers(newUsers); setNewMemberName(""); setNewMemberRole("");
                await syncToCloud(projects, newUsers);
            };

            const handleRemoveMember = async (userToRemove) => {
                if (users.length <= 1) { triggerToast("Cannot empty the roster!"); return; }
                const newUsers = users.filter(u => u !== userToRemove);
                setUsers(newUsers);
                await syncToCloud(projects, newUsers);
            };

            const handleReceiveAndStart = async (projectId, taskId) => {
                const taskName = definedTaskNames[`${projectId}-${taskId}`];
                if (!taskName || !taskName.trim()) { triggerToast("Please define the task description!"); return; }
                const now = getFormattedDateTime();
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, name: taskName.trim(), status: "In Progress", startDate: now } : t) };
                });
                setProjects(updated);
                await syncToCloud(updated, users);
            };

            const openEditTaskModal = (projectId, taskId, currentName) => {
                setEditTarget({ projectId, taskId }); setEditTaskNameInput(currentName); setIsEditModalOpen(true);
            };

            const saveEditedTaskName = async (e) => {
                e.preventDefault();
                if (!editTaskNameInput.trim() || !editTarget) return;
                const updated = projects.map(p => {
                    if (p.id !== editTarget.projectId) return p;
                    return { ...p, tasks: p.tasks.map(t => t.id === editTarget.taskId ? { ...t, name: editTaskNameInput.trim() } : t) };
                });
                setProjects(updated); setIsEditModalOpen(false); setEditTarget(null);
                await syncToCloud(updated, users);
            };

            const handlePauseTask = async (projectId, taskId) => {
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, status: "Paused" } : t) };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const handleResumeTask = async (projectId, taskId) => {
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, status: "In Progress" } : t) };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const handleDoneClick = (projectId, taskId) => {
                setHandOffTarget({ projectId, taskId }); setNextAssignee(users.find(u => u !== currentUser) || users[0]); setIsHandOffModalOpen(true);
            };

            const executeHandOff = async (e) => {
                e.preventDefault(); if (!handOffTarget) return;
                const { projectId, taskId } = handOffTarget;
                const historyDate = getFormattedDateOnly();
                const timestamp = Date.now();
                let spawnedTaskId = null;

                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const targetTask = p.tasks.find(t => t.id === taskId);
                    const completedTask = { ...targetTask, status: "Done", endDate: historyDate, completedAtTimestamp: timestamp };
                    const remainingTasks = p.tasks.filter(t => t.id !== taskId);
                    const shouldSpawnNextPlaceholder = !targetTask.isParallel && remainingTasks.filter(r => !r.isParallel).length === 0;

                    let updatedTasks = remainingTasks;
                    if (shouldSpawnNextPlaceholder) {
                        spawnedTaskId = `task-${Date.now()}`;
                        updatedTasks = [...remainingTasks, { id: spawnedTaskId, name: "Awaiting task description from the recipient...", status: "Pending Transfer", assignee: nextAssignee, startDate: null, endDate: null, isParallel: false }];
                    }
                    setLastHandOffAction({ projectId: p.id, originalTaskId: targetTask.id, spawnedTaskId: spawnedTaskId, sender: currentUser, recipient: nextAssignee });
                    return { ...p, tasks: updatedTasks, history: [completedTask, ...p.history] };
                });

                setProjects(updated); setIsHandOffModalOpen(false); setHandOffTarget(null);
                await syncToCloud(updated, users);
            };

            const handleUndoHandOff = async () => {
                if (!lastHandOffAction) return;
                const { projectId, originalTaskId, spawnedTaskId } = lastHandOffAction;
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const mistakenHistoryTask = p.history.find(h => h.id === originalTaskId);
                    if (!mistakenHistoryTask) return p;
                    return {
                        ...p,
                        tasks: [...p.tasks.filter(t => t.id !== spawnedTaskId), { ...mistakenHistoryTask, status: "In Progress", endDate: null, completedAtTimestamp: null }],
                        history: p.history.filter(h => h.id !== originalTaskId)
                    };
                });
                setProjects(updated); setLastHandOffAction(null); await syncToCloud(updated, users);
            };

            const handleAbsoluteFinishProject = async (projectId, taskId) => {
                if (!window.confirm("Is this book module fully complete for archival closeout?")) return;
                const historyDate = getFormattedDateOnly(); const timestamp = Date.now();
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const targetTask = p.tasks.find(t => t.id === taskId);
                    return { ...p, isArchived: p.tasks.length === 1, tasks: p.tasks.filter(t => t.id !== taskId), history: [{ ...targetTask, status: "Done", endDate: historyDate, completedAtTimestamp: timestamp }, ...p.history] };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const openParallelModal = (projectId) => {
                setParallelTargetProjectId(projectId); setParallelAssignee(users.find(u => u !== currentUser) || users[0]); setIsParallelModalOpen(true);
            };

            const executeParallelBranch = async (e) => {
                e.preventDefault(); if (!parallelTargetProjectId) return;
                const updated = projects.map(p => {
                    if (p.id !== parallelTargetProjectId) return p;
                    return { ...p, tasks: [...p.tasks, { id: `task-${Date.now()}`, name: "Awaiting parallel task details from recipient...", status: "Pending Transfer", assignee: parallelAssignee, startDate: null, endDate: null, isParallel: true }] };
                });
                setProjects(updated); setIsParallelModalOpen(false); await syncToCloud(updated, users);
            };

            const handleCreateProject = async (e) => {
                e.preventDefault(); let seriesName = seriesCreationMode === "new" ? newSeriesInput.trim().toUpperCase() : selectedExistingSeries;
                if (!seriesName) return;
                const computedTitle = `${seriesName} - ${selectedComponent} - ${selectedStage} - ${selectedLevel}`;
                const newProj = {
                    id: `proj-${Date.now()}`, series: seriesName, component: selectedComponent, stage: selectedStage, level: selectedLevel, title: computedTitle, stageColor: newProjectStageColor, isArchived: false,
                    tasks: [{ id: `task-${Date.now()}`, name: "Awaiting task description from the recipient...", status: "Pending Transfer", assignee: firstAssignee || users[0], startDate: null, endDate: null, isParallel: false }],
                    history: []
                };
                const updated = [newProj, ...projects]; setProjects(updated); setNewSeriesInput(""); setIsProjectModalOpen(false);
                await syncToCloud(updated, users);
            };

            const getStageBadgeStyle = (color) => {
                if (color === "Blue") return "bg-blue-950/80 text-blue-400 border-blue-900/50";
                if (color === "Green") return "bg-emerald-950/80 text-emerald-400 border-emerald-900/50";
                return "bg-rose-950/80 text-rose-400 border-rose-900/50";
            };

            const myPlateTasks = [];
            projects.forEach(p => {
                if (!p.isArchived) {
                    p.tasks.forEach(t => { if (t.assignee === currentUser) myPlateTasks.push({ projectId: p.id, projectTitle: p.title, projectStageColor: p.stageColor || "Red", ...t }); });
                }
            });

            const uniqueSeriesKeys = Array.from(new Set(projects.filter(p => !p.isArchived).map(p => p.series)));
            const allAvailableLevelsGlobal = [...STAGE_LEVELS["PS"], ...STAGE_LEVELS["GS"], ...STAGE_LEVELS["JHS"], ...STAGE_LEVELS["SHS"]];

            const toggleTree = (type, key) => {
                if (type === 'series') setExpandedSeries(p => ({ ...p, [key]: !p[key] }));
                if (type === 'component') setExpandedComponents(p => ({ ...p, [key]: !p[key] }));
                if (type === 'stage') setExpandedStages(p => ({ ...p, [key]: !p[key] }));
            };

            if (isLoading) {
                return e("div", { class: "flex flex-col items-center justify-center min-h-screen bg-[#080B10]" },
                    e("div", { class: "w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4" }),
                    e("p", { class: "text-sm font-bold tracking-wide text-slate-400" }, "Connecting to Cloud Database...")
                );
            }

            return e("div", { class: "max-w-5xl mx-auto px-4 py-6 md:py-10" },
                toast && e("div", { class: "fixed top-6 right-6 z-50 bg-slate-900 border border-indigo-500/40 shadow-2xl p-4 rounded-xl flex items-center gap-3" },
                    e("div", { class: "w-2 h-2 rounded-full bg-lime-400 animate-ping" }),
                    e("p", { class: "text-sm font-semibold text-slate-100" }, toast)
                ),
                SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE" && e("div", { class: "bg-amber-950/40 border border-amber-500/30 p-4 rounded-xl text-xs text-amber-300 mb-6 flex items-center gap-2" },
                    e("i", { class: "fa-solid fa-triangle-exclamation" }),
                    e("span", null, e("strong", null, "Setup Required: "), "Please configure your Google App URL in line 26.")
                ),
                e("header", { class: "flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-6 mb-8 gap-4" },
                    e("div", null,
                        e("h1", { class: "text-3xl font-extrabold heading-font text-white tracking-tight flex items-center gap-2" },
                            "Math Team Tracker", e("span", { class: "text-indigo-400" }, "."), e("span", { class: "text-xs bg-slate-800 text-slate-400 font-mono px-1.5 py-0.5 rounded" }, "Ver 9.1")
                        ),
                        e("p", { class: "text-slate-400 text-xs mt-0.5" }, "Cloud-Synced Matrix")
                    ),
                    e("div", { class: "flex flex-wrap items-center gap-3 w-full sm:w-auto justify-between sm:justify-end" },
                        e("button", { onClick: () => loadCloudData(true), class: "bg-slate-900 border border-slate-800 text-slate-400 px-3 py-2 rounded-xl text-xs font-bold hover:text-white" },
                            e("i", { class: "fa-solid fa-arrows-rotate mr-1" }), " Refresh"
                        ),
                        e("div", { class: "bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 flex items-center gap-2.5" },
                            e("div", null,
                                e("span", { class: "block text-[9px] uppercase tracking-wider text-slate-500 font-bold" }, "User Context:"),
                                e("select", { value: currentUser, onChange: (e) => setCurrentUser(e.target.value), class: "bg-transparent font-bold text-slate-100 text-sm focus:outline-none cursor-pointer pr-2" },
                                    users.map(u => e("option", { class: "bg-slate-950 text-slate-200", key: u, value: u }, u))
                                )
                            )
                        ),
                        e("button", { onClick: () => setIsTeamModalOpen(true), class: "bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-2" },
                            e("i", { class: "fa-solid fa-users text-indigo-400 text-xs" }), " Manage Team"
                        ),
                        e("button", { onClick: () => { setFirstAssignee(currentUser || users[0]); setIsProjectModalOpen(true); }, class: "bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 shadow-lg" },
                            e("i", { class: "fa-solid fa-plus text-xs" }), " New Project"
                        )
                    )
                ),
                e("div", { class: "flex flex-wrap gap-2 border-b border-slate-800 mb-8 bg-slate-900 p-1 rounded-xl w-full" },
                    e("button", { onClick: () => setActiveTab("user-view"), class: `px-4 py-2 rounded-lg font-bold text-xs transition flex items-center gap-2 ${activeTab === 'user-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}` }, "My Plate"),
                    e("button", { onClick: () => setActiveTab("series-view"), class: `px-4 py-2 rounded-lg font-bold text-xs transition flex items-center gap-2 ${activeTab === 'series-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}` }, "Per Series"),
                    e("button", { onClick: () => setActiveTab("level-view"), class: `px-4 py-2 rounded-lg font-bold text-xs transition flex items-center gap-2 ${activeTab === 'level-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}` }, "Per Level"),
                    e("button", { onClick: () => setActiveTab("workload-view"), class: `px-4 py-2 rounded-lg font-bold text-xs transition flex items-center gap-2 ${activeTab === 'workload-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}` }, "Workload")
                ),
                activeTab === "user-view" && e("div", { class: "space-y-6" },
                    lastHandOffAction && lastHandOffAction.sender === currentUser && e("div", { class: "bg-indigo-950/40 border border-indigo-500/30 p-4 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-3" },
                        e("div", null, e("h4", { class: "text-xs font-bold" }, "Mistakenly passed a task?"), e("p", { class: "text-[10px] text-slate-400" }, "Revert changes instantly.")),
                        e("button", { onClick: handleUndoHandOff, class: "bg-indigo-600 text-white text-xs font-black px-4 py-2 rounded-xl" }, "Undo Hand-off")
                    ),
                    e("div", null,
                        e("h2", { class: "text-xs font-black text-slate-400 uppercase tracking-widest mb-4" }, "Tasks Pending Your Action"),
                        myPlateTasks.length === 0 ? e("div", { class: "bg-slate-900/40 border border-slate-800 p-12 text-center rounded-2xl" }, "No workload allocated here.") :
                        e("div", { class: "grid gap-4 sm:grid-cols-2" },
                            myPlateTasks.map(task => e("div", { key: task.id, class: "bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between" },
                                e("div", null,
                                    e("div", { class: "flex justify-between mb-3" },
                                        e("span", { class: "text-[10px] font-bold bg-slate-950 px-2 py-0.5 rounded truncate max-w-[70%]" }, `📚 ${task.projectTitle}`),
                                        e("span", { class: `text-[9px] font-black px-2 py-0.5 rounded uppercase ${task.status === "In Progress" ? "bg-emerald-950 text-emerald-400" : "bg-amber-950 text-amber-400"}` }, task.status === "Pending Transfer" ? "📥 Incoming" : task.status)
                                    ),
                                    task.status === "Pending Transfer" ? e("div", { class: "mb-4 bg-slate-950 p-3.5 rounded-xl border border-dashed border-slate-800" },
                                        e("label", { class: "block text-[9px] font-black text-amber-400 uppercase mb-1" }, "Define Task Context Description"),
                                        e("input", { type: "text", placeholder: "e.g. Editing Module 1 Chapters 1-3", value: definedTaskNames[`${task.projectId}-${task.id}`] || "", onChange: (e) => setDefinedTaskNames({ ...definedTaskNames, [`${task.projectId}-${task.id}`]: e.target.value }), class: "w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none" })
                                    ) : e("div", { class: "mb-4 bg-slate-950/30 border border-slate-800/40 p-3 rounded-xl relative" },
                                        e("h3", { class: "text-xs font-bold text-slate-200 mb-1" }, task.name),
                                        e("p", { class: "text-[9px] text-slate-500" }, `Triggered: ${task.startDate}`),
                                        e("button", { onClick: () => openEditTaskModal(task.projectId, task.id, task.name), class: "absolute right-2 top-2 bg-slate-800 text-[9px] px-1.5 py-0.5 rounded" }, "Edit")
                                    )
                                ),
                                e("div", { class: "flex flex-col gap-2 pt-3 border-t border-slate-800/60" },
                                    task.status === "Pending Transfer" ? e("button", { onClick: () => handleReceiveAndStart(task.projectId, task.id), class: "w-full bg-emerald-600 text-slate-950 text-xs font-black py-2 rounded-xl" }, "Receive & Start") :
                                    e("div", { class: "space-y-2" },
                                        e("div", { class: "flex gap-2" },
                                            task.status === "In Progress" ? e("button", { onClick: () => handlePauseTask(task.projectId, task.id), class: "bg-slate-800 text-amber-400 text-xs font-bold px-2.5 py-1.5 rounded-xl" }, "Pause") : e("button", { onClick: () => handleResumeTask(task.projectId, task.id), class: "bg-emerald-950 text-emerald-400 text-xs font-bold px-2.5 py-1.5 rounded-xl" }, "Resume"),
                                            e("button", { onClick: () => openParallelModal(task.projectId), class: "bg-slate-800 text-slate-300 text-xs font-bold px-2.5 py-1.5 rounded-xl" }, "+ Parallel"),
                                            e("button", { onClick: () => handleDoneClick(task.projectId, task.id), class: "flex-1 bg-indigo-600 text-white text-xs font-black py-1.5 rounded-xl" }, "Done & Pass ➡️")
                                        ),
                                        e("button", { onClick: () => handleAbsoluteFinishProject(task.projectId, task.id), class: "w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-slate-950 font-black text-xs py-1.5 rounded-xl" }, "Mark Book Complete (Archive)")
                                    )
                                )
                            ))
                        )
                    )
                ),
                activeTab === "series-view" && e("div", { class: "space-y-4" },
                    uniqueSeriesKeys.map(seriesKey => {
                        const isSeriesExpanded = !!expandedSeries[seriesKey];
                        const seriesProjects = projects.filter(p => !p.isArchived && p.series === seriesKey);
                        return e("div", { key: seriesKey, class: "bg-slate-900 border border-slate-800 rounded-xl overflow-hidden" },
                            e("div", { onClick: () => toggleTree('series', seriesKey), class: "bg-slate-950/60 px-5 py-3.5 border-b border-slate-800 flex justify-between items-center cursor-pointer" },
                                e("span", { class: "text-sm font-black" }, `Series: ${seriesKey}`),
                                e("i", { class: `fa-solid ${isSeriesExpanded ? 'fa-angle-up' : 'fa-angle-down'}` })
                            ),
                            isSeriesExpanded && e("div", { class: "p-4 space-y-3 pl-8 bg-slate-900/30" },
                                COMPONENTS.map(comp => {
                                    const compKey = `${seriesKey}-${comp}`;
                                    const isCompExpanded = !!expandedComponents[compKey];
                                    const compProjects = seriesProjects.filter(p => p.component === comp);
                                    if (compProjects.length === 0) return null;
                                    return e("div", { key: comp, class: "border border-slate-800 rounded-lg overflow-hidden" },
                                        e("div", { onClick: () => toggleTree('component', compKey), class: "bg-slate-950/30 px-4 py-2.5 flex justify-between items-center cursor-pointer text-xs font-bold" },
                                            e("span", null, "Component: ", e("strong", { class: "text-indigo-400" }, comp)),
                                            e("i", { class: `fa-solid ${isCompExpanded ? 'fa-minus' : 'fa-plus'}` })
                                        ),
                                        isCompExpanded && e("div", { class: "p-3 space-y-2 pl-6" },
                                            STAGES.map(stg => {
                                                const stgKey = `${compKey}-${stg}`;
                                                const isStgExpanded = !!expandedStages[stgKey];
                                                const stageProjects = compProjects.filter(p => p.stage === stg);
                                                if (stageProjects.length === 0) return null;
                                                return e("div", { key: stg, class: "border border-slate-800 rounded bg-slate-950/40 overflow-hidden" },
                                                    e("div", { onClick: () => toggleTree('stage', stgKey), class: "px-3 py-2 flex justify-between items-center text-[11px] font-semibold text-slate-400 cursor-pointer" },
                                                        e("span", null, "Stage: ", e("strong", { class: "text-amber-400" }, stg)),
                                                        e("span", null, `${stageProjects.length} modules`)
                                                    ),
                                                    isStgExpanded && e("div", { class: "p-2 bg-slate-950/60 space-y-1 text-xs" },
                                                        stageProjects.map(proj => e("div", { key: proj.id, class: "bg-slate-900/60 p-2 rounded border border-slate-800" },
                                                            e("span", { class: "font-bold text-slate-200" }, proj.level),
                                                            e("div", { class: "text-[10px] text-slate-500" }, proj.tasks.map(t => `${t.assignee.split(" ")[0]} [${t.status}]`).join(", "))
                                                        ))
                                                    )
                                                );
                                            })
                                        );
                                })
                            )
                        );
                    })
                ),
                activeTab === "level-view" && e("div", { class: "space-y-4" },
                    allAvailableLevelsGlobal.map(lvl => {
                        const projectsInLvl = projects.filter(p => !p.isArchived && p.level === lvl);
                        if (projectsInLvl.length === 0) return null;
                        return e("div", { key: lvl, class: "bg-slate-900 border border-slate-800 rounded-xl p-4" },
                            e("h3", { class: "text-sm font-black text-indigo-400 mb-2 border-b border-slate-800 pb-1" }, `Level Cluster: ${lvl}`),
                            e("div", { class: "grid gap-2 sm:grid-cols-2 text-xs" },
                                projectsInLvl.map(p => e("div", { key: p.id, class: "bg-slate-950/40 p-3 rounded border border-slate-800/40" },
                                    e("span", { class: "font-bold text-slate-100" }, `${p.series} • ${p.component}`),
                                    e("p", { class: "text-[10px] text-slate-500 mt-1" }, p.tasks.map(t => t.assignee.split(" ")[0]).join(", "))
                                ))
                            )
                        );
                    })
                ),
                activeTab === "workload-view" && e("div", { class: "grid gap-4 md:grid-cols-2" },
                    users.map(usr => {
                        const userTasks = [];
                        projects.forEach(p => { if (!p.isArchived) p.tasks.forEach(t => { if (t.assignee === usr) userTasks.push({ title: p.title, ...t }); }); });
                        return e("div", { key: usr, class: "bg-slate-900 border border-slate-800 rounded-xl p-5" },
                            e("h3", { class: "text-sm font-black text-slate-200 border-b border-slate-800 pb-2 mb-3" }, usr),
                            userTasks.length === 0 ? e("p", { class: "text-xs text-slate-600 italic" }, "No active tasks.") :
                            e("div", { class: "space-y-2 text-xs" },
                                userTasks.map(tk => e("div", { key: tk.id, class: "bg-slate-950/60 p-2 rounded border border-slate-800" }, e("span", { class: "font-bold" }, tk.title), e("p", { class: "text-slate-400 text-[11px]" }, tk.name)))
                            )
                        );
                    })
                ),
                isProjectModalOpen && e("div", { class: "fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50" },
                    e("div", { class: "bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 text-xs space-y-3" },
                        e("h3", { class: "text-sm font-bold text-slate-100" }, "Architect New Module"),
                        e("form", { onSubmit: handleCreateProject, class: "space-y-3" },
                            e("div", { class: "flex gap-4 bg-slate-950 p-2 rounded" },
                                e("label", null, e("input", { type: "radio", checked: seriesCreationMode === "new", onChange: () => setSeriesCreationMode("new") }), " New Series"),
                                e("label", null, e("input", { type: "radio", checked: seriesCreationMode === "existing", onChange: () => setSeriesCreationMode("existing"), disabled: existingSeriesList.length === 0 }), " Existing Series")
                            ),
                            seriesCreationMode === "new" ? e("input", { type: "text", required: true, placeholder: "Series ID (e.g. NCM)", value: newSeriesInput, onChange: (e) => setNewSeriesInput(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }) :
                            e("select", { value: selectedExistingSeries, onChange: (e) => setSelectedExistingSeries(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }, existingSeriesList.map(x => e("option", { key: x, value: x }, x))),
                            e("select", { value: selectedComponent, onChange: (e) => setSelectedComponent(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }, COMPONENTS.map(c => e("option", { key: c, value: c }, c))),
                            e("select", { value: selectedStage, onChange: (e) => setSelectedStage(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }, STAGES.map(s => e("option", { key: s, value: s }, s))),
                            e("select", { value: selectedLevel, onChange: (e) => setSelectedLevel(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }, STAGE_LEVELS[selectedStage].map(l => e("option", { key: l, value: l }, l))),
                            e("select", { value: firstAssignee, onChange: (e) => setFirstAssignee(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }, users.map(u => e("option", { key: u, value: u }, u))),
                            e("div", { class: "flex justify-end gap-2" },
                                e("button", { type: "button", onClick: () => setIsProjectModalOpen(false) }, "Cancel"),
                                e("button", { type: "submit", class: "bg-indigo-600 text-white px-4 py-1.5 rounded-lg font-bold" }, "Inject Node")
                            )
                        )
                    )
                ),
                isHandOffModalOpen && e("div", { class: "fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50" },
                    e("div", { class: "bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-xs" },
                        e("h3", { class: "text-sm font-bold mb-3" }, "➡️ Hand-Off Task Owner"),
                        e("form", { onSubmit: executeHandOff, class: "space-y-4" },
                            e("select", { value: nextAssignee, onChange: (e) => setNextAssignee(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded font-bold text-slate-200" }, users.map(u => e("option", { key: u, value: u }, u))),
                            e("div", { class: "flex justify-end gap-2" }, e("button", { type: "button", onClick: () => setIsHandOffModalOpen(false) }, "Cancel"), e("button", { type: "submit", class: "bg-indigo-600 text-white px-4 py-1.5 rounded" }, "Confirm"))
                        )
                    )
                ),
                isParallelModalOpen && e("div", { class: "fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50" },
                    e("div", { class: "bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-xs" },
                        e("h3", { class: "text-sm font-bold mb-3" }, "Deploy Simultaneous Stream"),
                        e("form", { onSubmit: executeParallelBranch, class: "space-y-4" },
                            e("select", { value: parallelAssignee, onChange: (e) => setParallelAssignee(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }, users.map(u => e("option", { key: u, value: u }, u))),
                            e("div", { class: "flex justify-end gap-2" }, e("button", { type: "button", onClick: () => setIsParallelModalOpen(false) }, "Cancel"), e("button", { type: "submit", class: "bg-indigo-600 text-white px-4 py-1.5 rounded" }, "Deploy"))
                        )
                    )
                ),
                isEditModalOpen && e("div", { class: "fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50" },
                    e("div", { class: "bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-xs" },
                        e("h3", { class: "text-sm font-bold mb-3" }, "Correct Task Context"),
                        e("form", { onSubmit: saveEditedTaskName, class: "space-y-4" },
                            e("input", { type: "text", value: editTaskNameInput, onChange: (e) => setEditTaskNameInput(e.target.value), class: "w-full bg-slate-950 border border-slate-800 p-2 rounded" }),
                            e("div", { class: "flex justify-end gap-2" }, e("button", { type: "button", onClick: () => setIsEditModalOpen(false) }, "Cancel"), e("button", { type: "submit", class: "bg-indigo-600 text-white px-4 py-1.5 rounded" }, "Save"))
                        )
                    )
                ),
                isTeamModalOpen && e("div", { class: "fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50" },
                    e("div", { class: "bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-md w-full text-xs space-y-4" },
                        e("h3", { class: "text-sm font-bold text-slate-100" }, "Configure Active Team Roster"),
                        e("form", { onSubmit: handleAddMember, class: "space-y-2 bg-slate-950 p-3 rounded border border-slate-800" },
                            e("div", { class: "grid grid-cols-2 gap-2" },
                                e("input", { type: "text", required: true, placeholder: "Name", value: newMemberName, onChange: (e) => setNewMemberName(e.target.value), class: "bg-slate-900 border border-slate-800 p-2 rounded" }),
                                e("input", { type: "text", required: true, placeholder: "Role", value: newMemberRole, onChange: (e) => setNewMemberRole(e.target.value), class: "bg-slate-900 border border-slate-800 p-2 rounded" })
                            ),
                            e("button", { type: "submit", class: "w-full bg-indigo-600 text-white py-1.5 rounded font-bold" }, "Register Member Profile")
                        ),
                        e("div", { class: "max-h-40 overflow-y-auto space-y-2" },
                            users.map(u => e("div", { key: u, class: "flex justify-between items-center bg-slate-950/40 border border-slate-800 px-3 py-1.5 rounded-xl" },
                                e("span", null, u),
                                e("button", { onClick: () => handleRemoveMember(u), class: "text-slate-600 hover:text-rose-400" }, e("i", { class: "fa-solid fa-trash-can" }))
                            ))
                        ),
                        e("div", { class: "flex justify-end" }, e("button", { onClick: () => setIsTeamModalOpen(false), class: "text-slate-400 font-bold" }, "Close"))
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Team Tracker (Ver 9.2.2 - Streamlined Workflow)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080B10; }
        .heading-font { font-family: 'Urbanist', sans-serif; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- IMPORTANT CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1-nYWa-rrdwDywuOwUERSk5_c8Epgp2M5LKp96oM1Rbvpz6q_tEqCMRnz02gvnq2YlQ/exec"; 

        const COMPONENTS = ["TB", "TWE", "Others"];
        const STAGES = ["PS", "GS", "JHS", "SHS"];
        const STAGE_LEVELS = {
            "PS": ["N", "K1", "K2"],
            "GS": ["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6"],
            "JHS": ["Grade 7", "Grade 8", "Grade 9", "Grade 10"],
            "SHS": ["GenMath", "Basic Cal", "Pre Cal", "Stat and Prob", "Bus Math"]
        };

        const DEFAULT_USERS = ["Nila (Editor)", "Juan (Writer)", "Santi (Illustrator)", "Maria (Proofreader)", "Admin/PM"];

        function App() {
            const [users, setUsers] = useState(DEFAULT_USERS);
            const [projects, setProjects] = useState([]);
            const [currentUser, setCurrentUser] = useState("");
            const [activeTab, setActiveTab] = useState("user-view");
            const [isLoading, setIsLoading] = useState(true);

            // Expansion toggles
            const [openArchiveLogs, setOpenArchiveLogs] = useState({});
            const [lastHandOffAction, setLastHandOffAction] = useState(null);

            // Modals
            const [isProjectModalOpen, setIsProjectModalOpen] = useState(false);
            const [isHandOffModalOpen, setIsHandOffModalOpen] = useState(false);
            const [isParallelModalOpen, setIsParallelModalOpen] = useState(false);

            // Forms State
            const [seriesCreationMode, setSeriesCreationMode] = useState("new");
            const [newSeriesInput, setNewSeriesInput] = useState("");
            const [selectedExistingSeries, setSelectedExistingSeries] = useState("");
            const [selectedComponent, setSelectedComponent] = useState(COMPONENTS[0]);
            const [selectedStage, setSelectedStage] = useState(STAGES[0]);
            const [selectedLevel, setSelectedLevel] = useState(STAGE_LEVELS[STAGES[0]][0]);
            const [newProjectStageColor, setNewProjectStageColor] = useState("Red");
            const [firstAssignee, setFirstAssignee] = useState("");

            const [handOffTarget, setHandOffTarget] = useState(null); 
            const [nextAssignee, setNextAssignee] = useState("");
            const [parallelTargetProjectId, setParallelTargetProjectId] = useState(null);
            const [parallelAssignee, setParallelAssignee] = useState("");

            const [definedTaskNames, setDefinedTaskNames] = useState({});
            const [toast, setToast] = useState(null);

            const triggerToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 4000);
            };

            const loadCloudData = useCallback(async (showToast = false) => {
                if (SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE") {
                    setIsLoading(false);
                    return;
                }
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=readAll`);
                    const data = await response.json();
                    
                    if (data.users && data.users.length > 0) {
                        setUsers(data.users);
                        if (!currentUser) setCurrentUser(data.users[0]);
                    }
                    if (data.projects) setProjects(data.projects);
                    if (showToast) triggerToast("🔄 Data updated successfully!");
                } catch (error) {
                    console.error("Cloud Error:", error);
                    triggerToast("❌ Sync failure.");
                } finally {
                    setIsLoading(false);
                }
            }, [currentUser]);

            const syncToCloud = async (updatedProjects, updatedUsers) => {
                if (SCRIPT_URL === "YOUR_GOOGLE_WEB_APP_URL_HERE") return;
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "syncAll", projects: updatedProjects, users: updatedUsers })
                    });
                    triggerToast("☁️ Saved & Cloud Synced!");
                } catch (error) {
                    console.error("Cloud push failed:", error);
                    triggerToast("❌ Saved locally, Cloud failed.");
                }
            };

            useEffect(() => {
                loadCloudData();
                const interval = setInterval(() => loadCloudData(false), 30000);
                return () => clearInterval(interval);
            }, [loadCloudData]);

            useEffect(() => {
                setSelectedLevel(STAGE_LEVELS[selectedStage][0]);
            }, [selectedStage]);

            const getFormattedDateTime = () => new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: true });

            const handleUnarchive = async (projectId) => {
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, isArchived: false };
                });
                setProjects(updated);
                await syncToCloud(updated, users);
                triggerToast("📂 Project restored to active tracking!");
            };

            const handleReceiveAndStart = async (projectId, taskId) => {
                const taskName = definedTaskNames[`${projectId}-${taskId}`];
                if (!taskName || !taskName.trim()) { triggerToast("Please add a description!"); return; }
                const now = getFormattedDateTime();
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, name: taskName.trim(), status: "In Progress", startDate: now } : t) };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const handleDoneClick = (projectId, taskId) => {
                setHandOffTarget({ projectId, taskId }); setNextAssignee(users.find(u => u !== currentUser) || users[0]); setIsHandOffModalOpen(true);
            };

            const executeHandOff = async (e) => {
                e.preventDefault(); if (!handOffTarget) return;
                const { projectId, taskId } = handOffTarget;
                const historyDate = getFormattedDateTime(); 
                const timestamp = Date.now();
                let spawnedTaskId = null;

                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const targetTask = p.tasks.find(t => t.id === taskId);
                    const completedTask = { ...targetTask, status: "Done", endDate: historyDate, completedAtTimestamp: timestamp };
                    const remainingTasks = p.tasks.filter(t => t.id !== taskId);
                    const shouldSpawnNextPlaceholder = !targetTask.isParallel && remainingTasks.filter(r => !r.isParallel).length === 0;

                    let updatedTasks = remainingTasks;
                    if (shouldSpawnNextPlaceholder) {
                        spawnedTaskId = `task-${Date.now()}`;
                        updatedTasks = [...remainingTasks, { id: spawnedTaskId, name: "Awaiting task description from the recipient...", status: "Pending Transfer", assignee: nextAssignee, startDate: null, endDate: null, isParallel: false }];
                    }
                    setLastHandOffAction({ projectId: p.id, originalTaskId: targetTask.id, spawnedTaskId: spawnedTaskId, sender: currentUser, recipient: nextAssignee });
                    return { ...p, tasks: updatedTasks, history: [completedTask, ...p.history] };
                });

                setProjects(updated); setIsHandOffModalOpen(false); setHandOffTarget(null); await syncToCloud(updated, users);
            };

            const handleAbsoluteFinishProject = async (projectId, taskId) => {
                if (!window.confirm("Is this book module completely finalized?")) return;
                const historyDate = getFormattedDateTime();
                const updated = projects.map(p => {
                    if (p.id !== projectId) return p;
                    const targetTask = p.tasks.find(t => t.id === taskId);
                    return {
                        ...p,
                        isArchived: true,
                        tasks: p.tasks.filter(t => t.id !== taskId),
                        history: [{ ...targetTask, status: "Done", endDate: historyDate, completedAtTimestamp: Date.now() }, ...p.history]
                    };
                });
                setProjects(updated); await syncToCloud(updated, users);
            };

            const openParallelModal = (projectId) => {
                setParallelTargetProjectId(projectId); setParallelAssignee(users.find(u => u !== currentUser) || users[0]); setIsParallelModalOpen(true);
            };

            const executeParallelBranch = async (e) => {
                e.preventDefault(); if (!parallelTargetProjectId) return;
                const updated = projects.map(p => {
                    if (p.id !== parallelTargetProjectId) return p;
                    return { ...p, tasks: [...p.tasks, { id: `task-${Date.now()}`, name: "Awaiting parallel task...", status: "Pending Transfer", assignee: parallelAssignee, startDate: null, endDate: null, isParallel: true }] };
                });
                setProjects(updated); setIsParallelModalOpen(false); await syncToCloud(updated, users);
            };

            const handleCreateProject = async (e) => {
                e.preventDefault();
                let seriesName = seriesCreationMode === "new" ? newSeriesInput.trim().toUpperCase() : selectedExistingSeries;
                if (!seriesName) return;
                const computedTitle = `${seriesName} - ${selectedComponent} - ${selectedStage} - ${selectedLevel}`;
                const newProj = {
                    id: `proj-${Date.now()}`, series: seriesName, component: selectedComponent, stage: selectedStage, level: selectedLevel, title: computedTitle, stageColor: newProjectStageColor, isArchived: false,
                    tasks: [{ id: `task-${Date.now()}`, name: "Awaiting task description...", status: "Pending Transfer", assignee: firstAssignee || users[0], startDate: null, endDate: null, isParallel: false }],
                    history: []
                };
                const updated = [newProj, ...projects]; setProjects(updated); setIsProjectModalOpen(false); await syncToCloud(updated, users);
            };

            const toggleArchiveLogs = (id) => {
                setOpenArchiveLogs(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const myPlateTasks = [];
            projects.forEach(p => {
                if (!p.isArchived) {
                    p.tasks.forEach(t => { if (t.assignee === currentUser) myPlateTasks.push({ projectId: p.id, projectTitle: p.title, ...t }); });
                }
            });

            if (isLoading) return <div className="flex flex-col items-center justify-center min-h-screen bg-[#080B10] text-slate-400 font-bold">Refreshing Matrix Database...</div>;

            return (
                <div className="max-w-5xl mx-auto px-4 py-6 md:py-10">
                    {toast && <div className="fixed top-6 right-6 z-50 bg-slate-900 border border-indigo-500/40 p-4 rounded-xl text-xs font-bold text-slate-100">{toast}</div>}

                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-6 mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-extrabold heading-font text-white tracking-tight">Math Team Tracker<span className="text-indigo-400">.</span></h1>
                        </div>
                        <div className="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
                            <button onClick={() => loadCloudData(true)} className="bg-slate-900 border border-slate-800 text-slate-400 px-3 py-2 rounded-xl text-xs font-bold hover:text-white transition"><i className="fa-solid fa-arrows-rotate mr-1"></i> Refresh</button>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2">
                                <select value={currentUser} onChange={(e) => setCurrentUser(e.target.value)} className="bg-transparent font-bold text-slate-100 text-sm focus:outline-none">
                                    {users.map(u => <option className="bg-slate-950" key={u} value={u}>{u}</option>)}
                                </select>
                            </div>
                            <button onClick={() => setIsProjectModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 shadow-lg transition"><i className="fa-solid fa-plus text-xs"></i> New Project</button>
                        </div>
                    </header>

                    <div className="flex flex-wrap gap-2 border-b border-slate-800 mb-8 bg-slate-900 p-1 rounded-xl w-full">
                        <button onClick={() => setActiveTab("user-view")} className={`px-4 py-2 rounded-lg font-bold text-xs transition ${activeTab === 'user-view' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>My Plate</button>
                        <button onClick={() => setActiveTab("archive-view")} className={`px-4 py-2 rounded-lg font-bold text-xs transition ${activeTab === 'archive-view' ? 'bg-indigo-900 text-white' : 'text-slate-400'}`}><i className="fa-solid fa-box-archive mr-1.5"></i> Archive Logs</button>
                    </div>

                    {activeTab === "user-view" && (
                        <div className="grid gap-4 sm:grid-cols-2">
                            {myPlateTasks.length === 0 ? <p className="text-slate-600 italic p-10 col-span-2 text-center">Your workload is completely clear.</p> : myPlateTasks.map(task => (
                                <div key={task.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between mb-3">
                                            <span className="text-[10px] font-bold bg-slate-950 px-2 py-0.5 rounded border border-slate-800 truncate">📚 {task.projectTitle}</span>
                                            <span className="text-[9px] font-black px-2 py-0.5 rounded uppercase bg-emerald-950 text-emerald-400">{task.status === "Pending Transfer" ? "📥 Incoming" : "In Progress"}</span>
                                        </div>
                                        {task.status === "Pending Transfer" ? (
                                            <div className="mb-4 bg-slate-950 p-3.5 rounded-xl border border-dashed border-slate-800">
                                                <input type="text" placeholder="Task description context..." value={definedTaskNames[`${task.projectId}-${task.id}`] || ""} onChange={(e) => setDefinedTaskNames({ ...definedTaskNames, [`${task.projectId}-${task.id}`]: e.target.value })} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none" />
                                            </div>
                                        ) : (
                                            <div className="mb-4 bg-slate-950/30 p-3 rounded-xl border border-slate-800/40">
                                                <h3 className="text-xs font-bold text-slate-200 mb-1">{task.name}</h3>
                                                <p className="text-[9px] text-slate-500">Started: {task.startDate}</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex flex-col gap-2 pt-3 border-t border-slate-800/60">
                                        {task.status === "Pending Transfer" ? <button onClick={() => handleReceiveAndStart(task.projectId, task.id)} className="w-full bg-emerald-600 text-slate-950 text-xs font-black py-2 rounded-xl">Receive & Start</button> : (
                                            <div className="space-y-2">
                                                <div className="flex gap-2">
                                                    <button onClick={() => openParallelModal(task.projectId)} className="bg-slate-800 text-slate-300 text-xs font-bold px-3 py-1.5 rounded-xl flex-1">+ Parallel</button>
                                                    <button onClick={() => handleDoneClick(task.projectId, task.id)} className="flex-[2] bg-indigo-600 text-white text-xs font-black py-1.5 rounded-xl">Done & Pass</button>
                                                </div>
                                                <button onClick={() => handleAbsoluteFinishProject(task.projectId, task.id)} className="w-full bg-gradient-to-r from-indigo-600 to-indigo-800 text-white font-black text-xs py-1.5 rounded-xl">Mark Book Complete & Archive</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === "archive-view" && (
                        <div className="space-y-4">
                            <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Finalized Production Archive Logs</h2>
                            <div className="grid gap-3">
                                {projects.filter(p => p.isArchived).length === 0 ? <p className="text-center p-10 text-slate-700 italic">No archived tracks available.</p> : 
                                projects.filter(p => p.isArchived).map(p => {
                                    const isLogOpen = !!openArchiveLogs[p.id];
                                    return (
                                        <div key={p.id} className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                                            <div className="p-4 flex justify-between items-center bg-slate-950/40">
                                                <div className="flex-1 cursor-pointer" onClick={() => toggleArchiveLogs(p.id)}>
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-sm font-bold text-slate-200">{p.title}</span>
                                                        <i className={`fa-solid text-slate-500 text-xs ${isLogOpen ? 'fa-chevron-up' : 'fa-chevron-down'}`}></i>
                                                    </div>
                                                    <div className="text-[10px] text-slate-500 mt-0.5">Click to expand processing history dates ({p.history ? p.history.length : 0} logs)</div>
                                                </div>
                                                <button onClick={() => handleUnarchive(p.id)} className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-[10px] font-black transition ml-4"><i className="fa-solid fa-rotate-left mr-1"></i> Restore</button>
                                            </div>
                                            
                                            {isLogOpen && (
                                                <div className="p-4 bg-slate-950/80 border-t border-slate-800/60 space-y-3">
                                                    <h4 className="text-[10px] uppercase font-black tracking-widest text-indigo-400">Task Completion Logs:</h4>
                                                    {p.history && p.history.length > 0 ? (
                                                        <div className="space-y-2 border-l-2 border-slate-800 pl-4 ml-2">
                                                            {p.history.map((h, index) => (
                                                                <div key={index} className="text-xs bg-slate-900/60 p-2.5 rounded border border-slate-800/40">
                                                                    <div className="flex justify-between font-bold text-slate-300">
                                                                        <span>{h.name}</span>
                                                                        <span className="text-[10px] text-emerald-400 bg-emerald-950 px-1.5 py-0.5 rounded uppercase">Done</span>
                                                                    </div>
                                                                    <div className="grid grid-cols-2 gap-2 mt-1.5 text-[10px] text-slate-500">
                                                                        <div><span className="text-slate-600">Assignee:</span> {h.assignee}</div>
                                                                        <div className="text-right"><span className="text-slate-600">Received/Started:</span> {h.startDate || "N/A"}</div>
                                                                        <div className="col-span-2 text-right text-indigo-400"><span className="text-slate-600">Finished:</span> {h.endDate}</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ) : <p className="text-[11px] text-slate-600 italic">No history dates saved inside this legacy file node.</p>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Modals injection logic */}
                    {isProjectModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 text-xs space-y-3">
                                <h3 className="text-sm font-bold text-slate-100">Architect New Module</h3>
                                <form onSubmit={handleCreateProject} className="space-y-3">
                                    <div className="flex gap-4 bg-slate-950 p-2 rounded">
                                        <label><input type="radio" checked={seriesCreationMode === "new"} onChange={() => setSeriesCreationMode("new")} /> New Series</label>
                                        <label><input type="radio" checked={seriesCreationMode === "existing"} onChange={() => setSeriesCreationMode("existing")} /> Existing Series</label>
                                    </div>
                                    {seriesCreationMode === "new" ? <input type="text" required placeholder="Series Code (e.g. NCM)" value={newSeriesInput} onChange={(e) => setNewSeriesInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded" /> :
                                    <select value={selectedExistingSeries} onChange={(e) => setSelectedExistingSeries(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded">{Array.from(new Set(projects.map(p => p.series))).map(x => <option key={x} value={x}>{x}</option>)}</select>}
                                    <select value={selectedComponent} onChange={(e) => setSelectedComponent(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded">{COMPONENTS.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    <select value={selectedStage} onChange={(e) => setSelectedStage(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded">{STAGES.map(s => <option key={s} value={s}>{s}</option>)}</select>
                                    <select value={selectedLevel} onChange={(e) => setSelectedLevel(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded">{STAGE_LEVELS[selectedStage].map(l => <option key={l} value={l}>{l}</option>)}</select>
                                    <select value={firstAssignee} onChange={(e) => setFirstAssignee(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded">{users.map(u => <option key={u} value={u}>{u}</option>)}</select>
                                    <div className="flex justify-end gap-2 pt-2"><button type="button" onClick={() => setIsProjectModalOpen(false)}>Cancel</button><button type="submit" className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg font-bold">Deploy Module</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isHandOffModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-xs">
                                <h3 className="text-sm font-bold mb-3">➡️ Hand-Off Module Assignment</h3>
                                <form onSubmit={executeHandOff} className="space-y-4">
                                    <select value={nextAssignee} onChange={(e) => setNextAssignee(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded font-bold text-slate-200">{users.map(u => <option key={u} value={u}>{u}</option>)}</select>
                                    <div className="flex justify-end gap-2"><button type="button" onClick={() => setIsHandOffModalOpen(false)}>Cancel</button><button type="submit" className="bg-indigo-600 text-white px-4 py-1.5 rounded">Confirm Transfer</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isParallelModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-xs">
                                <h3 className="text-sm font-bold mb-3">Deploy Simultaneous Workflow</h3>
                                <form onSubmit={executeParallelBranch} className="space-y-4">
                                    <select value={parallelAssignee} onChange={(e) => setParallelAssignee(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2 rounded">{users.map(u => <option key={u} value={u}>{u}</option>)}</select>
                                    <div className="flex justify-end gap-2"><button type="button" onClick={() => setIsParallelModalOpen(false)}>Cancel</button><button type="submit" className="bg-indigo-600 text-white px-4 py-1.5 rounded">Deploy</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
